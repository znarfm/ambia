name: Bug Report
description: Create a report to help us improve Ambia.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Device, OS, Browser, etc.
      placeholder: |
        - OS: iOS 17.4
        - Browser: Safari
        - Device: iPhone 15
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the bug report here.
